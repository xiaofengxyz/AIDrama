services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aidrama-backend
    env_file:
      - path: .env.local
        required: false
    environment:
      - NO_PROXY=*.aliyuncs.com,localhost,127.0.0.1
      - AIDRAMA_ENV_FILE=.env.local
      - API_HOST=0.0.0.0
      - API_PORT=${API_PORT:-48217}
      - LLM_PROVIDER=${LLM_PROVIDER:-dashscope}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen-plus}
    volumes:
      - ./output:/app/output
    ports:
      - "${API_PORT:-48217}:${API_PORT:-48217}"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aidrama-frontend
    ports:
      - "${FRONTEND_PORT:-39211}:80"
    depends_on:
      - backend
    restart: unless-stopped
