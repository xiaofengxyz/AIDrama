services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aidrama-backend
    env_file:
      - path: .env.local
        required: false
    environment:
      - NO_PROXY=*.aliyuncs.com,localhost,127.0.0.1
      - AIDRAMA_ENV_FILE=.env.local
    volumes:
      - ./output:/app/output
    ports:
      - "17177:17177"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aidrama-frontend
    ports:
      - "3014:80"
    depends_on:
      - backend
    restart: unless-stopped
