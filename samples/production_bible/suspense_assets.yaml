        - wet_black
      materials:
        - glossy nylon
      silhouette: knee_length_hooded
      reference_images:
        - refs/blue_raincoat.png
      locked_traits:
        - cobalt color
        - reflective hood trim
      continuity_notes:
        - do not replace with a school blazer or casual hoodie
  continuity_locks:
